apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mailgate-alerts
  namespace: mailgate
  labels:
    release: monitoring
    app.kubernetes.io/name: mailgate-alerts
spec:
  groups:
    - name: mailgate.rules
      rules:
        - alert: MailgateDown
          expr: up{namespace="mailgate",service="mailgate-server"} == 0
          for: 5m
          labels:
            severity: critical
            app: mailgate
          annotations:
            summary: mailgate-server is down
            description: Prometheus cannot scrape mailgate-server debug metrics for 5 minutes.
        - alert: MailgateHighErrorRate
          expr: sum(rate(request_count{error!="ok"}[5m])) / sum(rate(request_count[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            app: mailgate
          annotations:
            summary: mailgate error rate is high
            description: The non-ok request ratio stayed above 5% for 10 minutes.
        - alert: MailgateHighP95Latency
          expr: 1000 * histogram_quantile(0.95, sum by (le) (rate(request_latency_seconds_bucket[5m]))) > 500
          for: 10m
          labels:
            severity: warning
            app: mailgate
          annotations:
            summary: mailgate p95 latency is high
            description: The p95 latency stayed above 500ms for 10 minutes.
