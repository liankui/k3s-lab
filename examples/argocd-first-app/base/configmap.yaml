apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-web
  namespace: demo-gitops
data:
  index.html: |
    <html>
      <head>
        <title>Hello GitOps</title>
        <style>
          body { font-family: sans-serif; margin: 3rem; line-height: 1.5; }
          .card { max-width: 40rem; padding: 2rem; border: 1px solid #ddd; border-radius: 1rem; }
          code { background: #f5f5f5; padding: 0.1rem 0.3rem; border-radius: 0.25rem; }
        </style>
      </head>
      <body>
        <div class="card">
          <h1>Hello from GitOps v1</h1>
          <p>This page is served from a ConfigMap managed by Argo CD.</p>
          <p>Edit <code>examples/argocd-first-app/base/configmap.yaml</code>, push to Git, and watch Argo CD sync.</p>
        </div>
      </body>
    </html>
