apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git://192.168.31.102:9418/k3s-lab-mirror.git
    targetRevision: main
    path: examples/argocd-first-app/base
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
